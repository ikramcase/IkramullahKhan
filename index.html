  <script>
    (() => {
      try {
        const savedTheme = localStorage.getItem("syed-tahir-theme");
        const savedLanguage = localStorage.getItem("syed-tahir-language");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? "dark" : "light");
        if (savedLanguage) document.documentElement.lang = savedLanguage;
        if (savedLanguage === "ur") document.documentElement.dir = "rtl";
      } catch (error) {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
